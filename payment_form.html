<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forma e Pagesës | Noteria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e2eafc 0%, #f8fafc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .payment-card {
            max-width: 480px;
            margin: auto;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(44,108,223,0.12);
            background: #fff;
            padding: 32px 28px;
        }
        .payment-title {
            font-size: 2rem;
            font-weight: 700;
            color: #244d96;
            margin-bottom: 18px;
        }
        .payment-subtitle {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 24px;
        }
        .form-label {
            font-weight: 600;
            color: #244d96;
        }
        .form-control, .form-select {
            border-radius: 8px;
            font-size: 1.05rem;
            padding: 12px 14px;
        }
        .btn-pay {
            background: linear-gradient(90deg,#244d96 0%,#cfa856 100%);
            color: #fff;
            font-weight: 700;
            border-radius: 10px;
            font-size: 1.15rem;
            padding: 14px 0;
            box-shadow: 0 4px 16px rgba(44,108,223,0.08);
            transition: background 0.2s;
        }
        .btn-pay:hover {
            background: linear-gradient(90deg,#1e3c72 0%,#b8860b 100%);
        }
        .secure {
            color: #388e3c;
            font-size: 1rem;
            margin-bottom: 18px;
        }
        .info {
            color: #184fa3;
            background: #e2eafc;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 18px;
            font-size: 1rem;
            text-align: center;
        }
        .error {
            color: #d32f2f;
            background: #ffeaea;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 18px;
            font-size: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <div class="text-center mb-4">
            <i class="fas fa-credit-card fa-3x text-primary mb-2"></i>
            <div class="payment-title">Forma e Pagesës</div>
            <div class="payment-subtitle">Transaksionet mbrohen me enkriptim bankar 256-bit SSL.</div>
        </div>
        <form id="paymentForm">
            <div class="mb-3">
                <label for="payer_name" class="form-label">Emri dhe Mbiemri</label>
                <input type="text" class="form-control" id="payer_name" name="payer_name" placeholder="Shkruani emrin e plotë" required>
            </div>
            <div class="mb-3">
                <label for="payer_iban" class="form-label">IBAN</label>
                <input type="text" class="form-control" id="payer_iban" name="payer_iban" placeholder="Shembull: XK051212012345678901" maxlength="20" required>
                <div class="form-text">Shembull IBAN-i: <b>XK051212012345678901</b> (pa hapësira)</div>
            </div>
            <div class="mb-3">
                <label for="amount" class="form-label">Shuma (€)</label>
                <input type="number" class="form-control" id="amount" name="amount" min="10" step="0.01" placeholder="Shkruani shumën" required>
            </div>
            <div class="mb-3">
                <label for="bank_name" class="form-label">Zgjidh Bankën</label>
                <select class="form-select" id="bank_name" name="bank_name" required>
                    <option value="">-- Zgjidhni Bankën --</option>
                    <option value="Banka Ekonomike">Banka Ekonomike</option>
                    <option value="BKT">Banka Kombëtare Tregtare</option>
                    <option value="Credins">Credins Bank</option>
                    <option value="ProCredit">ProCredit Bank</option>
                    <option value="Raiffeisen">Raiffeisen Bank</option>
                    <option value="NLB">NLB Banka</option>
                    <option value="TEB">TEB Banka</option>
                    <option value="Paysera">Paysera</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Përshkrimi</label>
                <textarea class="form-control" id="description" name="description" rows="2" placeholder="Përshkruani pagesën" required></textarea>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Fjalëkalimi</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Lëre bosh nëse nuk do ta ndryshosh">
            </div>
            <button type="submit" class="btn btn-pay w-100 mt-3">
                <i class="fas fa-paper-plane me-2"></i> Paguaj Tani
            </button>
        </form>
        <div id="paymentMessage" class="mt-3"></div>
    </div>
    <script>
    document.getElementById('paymentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const form = e.target;
        const msg = document.getElementById('paymentMessage');
        msg.innerHTML = '';
        // Simple client-side validation for IBAN
        const iban = form.payer_iban.value.trim();
        if (!/^XK[0-9]{2}[0-9]{16}$/.test(iban)) {
            msg.innerHTML = '<div class="error">IBAN i pavlefshëm. Formati duhet të jetë: XK + 2 shifra kontrolli + 16 shifra llogarie.</div>';
            return;
        }
        msg.innerHTML = '<div class="info">Po procesojmë pagesën...</div>';
        // Simulate AJAX payment (replace with real AJAX call)
        setTimeout(function() {
            msg.innerHTML = '<div class="success">Pagesa u krye me sukses!</div>';
        }, 2000);
    });
    </script>
</body>
</html>
